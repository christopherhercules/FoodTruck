<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Online - Mas Chingon Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #D62828;
            --red-dark: #a81f1f;
            --gold: #F7B731;
            --green: #2D6A4F;
            --green-light: #52B788;
            --bg: #0f0f0f;
            --bg2: #1a1a1a;
            --bg3: #242424;
            --border: #333;
            --text: #f0f0f0;
            --text-muted: #888;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: var(--bg2);
            border-bottom: 3px solid var(--red);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 2rem;
            color: var(--red);
            letter-spacing: 2px;
        }

        .logo span { color: var(--gold); }

        .cart-badge {
            background: var(--red);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }
        .cart-badge:hover { background: var(--red-dark); }
        .cart-count {
            background: var(--gold);
            color: #000;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* LAYOUT */
        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 900px) {
            .page { grid-template-columns: 1fr; }
            .sidebar { position: relative; top: 0; }
        }

        /* CUSTOMER INFO */
        .section-card {
            background: var(--bg2);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.4rem;
            color: var(--gold);
            letter-spacing: 1px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg3);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--red);
        }
        select option { background: var(--bg3); }

        /* CATEGORY TABS */
        .cat-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .cat-tab {
            padding: 0.4rem 1rem;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-tab:hover { border-color: var(--red); color: var(--text); }
        .cat-tab.active { background: var(--red); border-color: var(--red); color: white; }

        /* MENU ITEMS */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 600px) { .menu-grid { grid-template-columns: 1fr; } }

        .menu-item {
            background: var(--bg3);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            transition: border-color 0.2s, transform 0.15s;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .menu-item:hover { border-color: var(--red); transform: translateY(-2px); }

        .item-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
            line-height: 1.2;
        }
        .item-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
            flex: 1;
        }
        .item-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.5rem;
        }
        .item-price {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--green-light);
        }

        /* ── CUSTOMIZATION MODAL ─────────────────────────────── */
        #customizeModal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); z-index: 9999;
            align-items: center; justify-content: center; padding: 1rem;
        }
        .cm-card {
            background: var(--bg2); border: 1px solid #333; border-radius: 20px;
            padding: 24px 20px; width: 100%; max-width: 420px;
            max-height: 85vh; overflow-y: auto;
        }
        .cm-header { margin-bottom: 16px; }
        .cm-header h3 { color: var(--text); font-size: 1.1rem; margin: 0 0 2px; }
        .cm-header .cm-price { color: var(--gold); font-size: 1rem; font-weight: 700; }
        .cm-group { margin-bottom: 16px; }
        .cm-group-label { font-size: 0.78rem; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
        .cm-options { display: flex; flex-wrap: wrap; gap: 8px; }
        .cm-option {
            display: flex; align-items: center; gap: 6px;
            background: var(--bg3); border: 1.5px solid #444; border-radius: 20px;
            padding: 6px 12px; cursor: pointer; font-size: 0.85rem; color: var(--text);
            transition: all 0.15s; user-select: none;
        }
        .cm-option input { display: none; }
        .cm-option:has(input:checked) { border-color: var(--red); background: rgba(214,40,40,0.15); color: #fff; }
        .cm-qty-row { display:flex; align-items:center; justify-content:space-between;
            padding: 12px 0; border-top: 1px solid #333; margin-top: 8px; }
        .cm-qty-ctrl { display:flex; align-items:center; gap:16px; }
        .cm-qty-btn { width:32px; height:32px; border-radius:50%; border:1.5px solid #555;
            background:transparent; color:var(--text); font-size:1.2rem; cursor:pointer;
            display:flex; align-items:center; justify-content:center; line-height:1; }
        .cm-qty-btn:hover { border-color:var(--red); color:var(--red); }
        #cmQtyVal { font-size:1.1rem; font-weight:700; min-width:20px; text-align:center; }
        .cm-actions { display: flex; gap: 10px; margin-top: 12px; }
        .cm-cancel { flex: 1; padding: 12px; border-radius: 12px; border: 1.5px solid #444;
            background: transparent; color: #aaa; font-size: 0.9rem; cursor: pointer; font-family: inherit; }
        .cm-confirm { flex: 2; padding: 12px; border-radius: 12px; border: none;
            background: var(--red); color: #fff; font-size: 0.95rem; font-weight: 700;
            cursor: pointer; font-family: inherit; }

        .add-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .add-btn:hover { background: var(--red-dark); }

        /* LOADING STATE */
        .loading-menu {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .spinner {
            border: 3px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: #3a1a1a;
            border: 1px solid var(--red);
            border-radius: 8px;
            padding: 1rem;
            color: #ff8888;
            font-size: 0.9rem;
        }

        /* SIDEBAR / CART */
        .sidebar {
            position: sticky;
            top: 80px;
        }

        .cart-card {
            background: var(--bg2);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .cart-empty {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
        }
        .cart-empty .emoji { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
            gap: 0.5rem;
        }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 600; font-size: 0.9rem; }
        .cart-item-customization { font-size: 0.75rem; color: var(--text-muted); }
        .cart-item-price { font-weight: 700; color: var(--green-light); white-space: nowrap; }
        .remove-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0 0.2rem;
            transition: color 0.2s;
        }
        .remove-btn:hover { color: var(--red); }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            padding-top: 0.8rem;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .total-amount { color: var(--green-light); }

        .place-order-btn {
            width: 100%;
            background: var(--red);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 10px;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.3rem;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        .place-order-btn:hover { background: var(--red-dark); }
        .place-order-btn:disabled { background: #444; cursor: not-allowed; }

        /* CONFIRMATION */
        #confirmationScreen {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
            max-width: 500px;
            margin: 3rem auto;
            background: var(--bg2);
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .confirm-icon { font-size: 4rem; margin-bottom: 1rem; }
        .confirm-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            color: var(--green-light);
            letter-spacing: 2px;
        }
        .confirm-subtitle { color: var(--text-muted); margin: 0.5rem 0 1.5rem; }
        .order-number-box {
            background: var(--bg3);
            border: 2px dashed var(--gold);
            border-radius: 12px;
            padding: 1rem 2rem;
            display: inline-block;
            margin: 1rem 0;
        }
        .order-number-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .order-number-value {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            color: var(--gold);
            letter-spacing: 3px;
        }
        .new-order-btn {
            background: var(--green);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 1.5rem;
            letter-spacing: 1px;
        }
        .new-order-btn:hover { background: #1e4d38; }
    .consent-label{display:flex;align-items:flex-start;gap:0.6rem;cursor:pointer;font-size:0.78rem;color:var(--text-muted,#888);line-height:1.4;padding:0.6rem 0.75rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px}.consent-label input[type=checkbox]{margin-top:2px;accent-color:#D62828;width:15px;height:15px;flex-shrink:0;cursor:pointer}.consent-label span a{color:inherit;text-decoration:underline}.sms-consent-wrap{margin-bottom:0.75rem}</style>
</head>
<body>

<header>
    <a href="index.html" class="logo" style="text-decoration:none;">Mas <span>Chingon</span> <span style="color:#888;font-size:1.2rem;letter-spacing:0">Restaurant</span></a>
    <div class="cart-badge" onclick="scrollToCart()">
        🛒 My Order
        <div class="cart-count" id="cartCount">0</div>
    </div>
</header>

<div id="mainContent">
    <div class="page">
        <!-- LEFT COLUMN -->
        <div class="main-col">

            <!-- Customer Info -->
            <div class="section-card">
                <div class="section-title">📋 Your Info</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Your Name *</label>
                        <input type="text" id="customerName" placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label>Order Type *</label>
                        <select id="orderType" onchange="toggleTable()">
                            <option value="">Select...</option>
                            <option value="Dine-In">Dine-In</option>
                            <option value="Pickup">Pickup</option>
                            <option value="Delivery">Delivery</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" id="tableGroup" style="display:none;">
                    <label>Table Number *</label>
                    <select id="tableNumber">
                        <option value="">Select table</option>
                        <option value="1">Table 1</option>
                        <option value="2">Table 2</option>
                        <option value="3">Table 3</option>
                        <option value="4">Table 4</option>
                        <option value="5">Table 5</option>
                        <option value="6">Table 6</option>
                        <option value="7">Table 7</option>
                        <option value="8">Table 8</option>
                        <option value="P1">Patio 1</option>
                        <option value="P2">Patio 2</option>
                        <option value="P3">Patio 3</option>
                        <option value="P4">Patio 4</option>
                        <option value="BAR">Bar</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Phone (optional)</label>
                    <input type="tel" id="customerPhone" placeholder="For order-ready text" oninput="document.getElementById('smsConsentGroup').style.display=this.value?'block':'none'">
                </div>
                <div class="form-group" id="smsConsentGroup" style="display:none">
                    <label class="consent-label">
                        <input type="checkbox" id="smsConsent">
                        <span>Text me when my order is ready. Msg &amp; data rates may apply. Reply STOP to opt out.</span>
                    </label>
                </div>
                <div class="form-group">
                    <label>Special Instructions</label>
                    <input type="text" id="specialInstructions" placeholder="Allergies, preferences...">
                </div>
            </div>

            <!-- Menu -->
            <div class="section-card">
                <div class="section-title">🌮 Menu</div>
                <div class="cat-tabs" id="catTabs"></div>
                <div id="menuContainer">
                    <div class="loading-menu">
                        <div class="spinner"></div>
                        <p>Loading menu...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar" id="cartSection">
            <div class="cart-card">
                <div class="section-title">🛒 Your Order</div>
                <div id="cartContent">
                    <div class="cart-empty">
                        <span class="emoji">🌮</span>
                        <p>Add items to get started!</p>
                    </div>
                </div>
                <button class="place-order-btn" id="placeOrderBtn" disabled onclick="placeOrderWithConfirm()">
                    Place Order
                </button>
            </div>
        </div>
    </div>
</div>

<!-- CONFIRMATION -->
<div id="confirmationScreen">
    <div class="confirm-icon">✅</div>
    <div class="confirm-title">Order Placed!</div>
    <div class="confirm-subtitle">Your order is being prepared. Show this number to your server.</div>
    <div class="order-number-box">
        <div class="order-number-label">Order Number</div>
        <div class="order-number-value" id="confirmOrderNumber"></div>
    </div>
    <p style="color: var(--text-muted); font-size: 0.9rem;">We'll have it ready soon! 🔥</p>
    <a id="trackOrderLink" href="#" style="
        display: inline-block;
        margin-top: 1rem;
        background: var(--green);
        color: white;
        text-decoration: none;
        padding: 0.8rem 2rem;
        border-radius: 10px;
        font-family: 'Bebas Neue', cursive;
        font-size: 1.2rem;
        letter-spacing: 1px;
    ">📍 Track Your Order</a>
    <br>
    <button class="new-order-btn" onclick="location.reload()">Place Another Order</button>
</div>

<script type="module">
    // ─── CONFIG ─────────────────────────────────────────────────────────────────
    // Paste your amplify_outputs.json values here:
    const APPSYNC_URL = "https://d2zlzofjerf4hd6gltypy2rnlm.appsync-api.us-east-1.amazonaws.com/graphql";
    const API_KEY = "da2-6l2dtmahczbbnlp3m2vmgihqby";

    // ─── GRAPHQL HELPER ─────────────────────────────────────────────────────────
    async function gql(query, variables = {}) {
        const res = await fetch(APPSYNC_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-api-key": API_KEY
            },
            body: JSON.stringify({ query, variables })
        });
        const json = await res.json();
        if (json.errors) throw new Error(json.errors[0].message);
        return json.data;
    }

    // ─── STATE ──────────────────────────────────────────────────────────────────
    let allMenuItems = [];
    let cart = [];
    let activeCategory = "All";

    // ─── LOAD PENDING CART FROM CHAT WIDGET ────────────────────────────────────
    (function loadPendingCart() {
      try {
        const pending = JSON.parse(localStorage.getItem('ft-pending-cart') || '[]');
        if (pending.length > 0) {
          pending.forEach(item => {
            cart.push({ itemId: item.itemId, name: item.name, price: parseFloat(item.price), customization: item.customization || '' });
          });
          localStorage.removeItem('ft-pending-cart');
        }
      } catch(e) {}
    })();

    const CATEGORIES = ["All", "Breakfast", "Main", "Antojitos", "Specialty", "Extras", "Drinks"];

    const TABLE_ASSIGNMENTS = {
        "1": "Maria", "2": "Maria", "3": "Carlos", "4": "Carlos",
        "5": "Rosa", "6": "Rosa", "7": "Miguel", "8": "Miguel",
        "P1": "Ana", "P2": "Ana", "P3": "Juan", "P4": "Juan", "BAR": "Diego"
    };

    // ─── FETCH MENU ─────────────────────────────────────────────────────────────
    async function loadMenu() {
        const query = `
            query ListMenuItems {
                listMenuItems(limit: 1000, filter: { itemId: { beginsWith: "ITEM-" } }) {
                    items {
                        id itemId name description price category available customizationOptions modifierGroups
                    }
                }
            }
        `;
        try {
            const data = await gql(query);
            allMenuItems = (data.listMenuItems.items || [])
                .filter(i => i.available !== false)
                .sort((a, b) => a.name.localeCompare(b.name));
            renderCategoryTabs();
            renderMenu();
            if (cart.length > 0) renderCart();
        } catch (err) {
            document.getElementById("menuContainer").innerHTML = `
                <div class="error-msg">
                    ⚠️ Could not load menu. Please check your API key configuration.<br>
                    <small>${err.message}</small>
                </div>`;
        }
    }

    // ─── RENDER TABS ────────────────────────────────────────────────────────────
    function renderCategoryTabs() {
        const counts = {};
        allMenuItems.forEach(i => { counts[i.category] = (counts[i.category] || 0) + 1; });
        const tabs = document.getElementById("catTabs");
        tabs.innerHTML = CATEGORIES
            .filter(c => c === "All" || counts[c])
            .map(c => {
                const count = c === "All" ? allMenuItems.length : (counts[c] || 0);
                return `<button class="cat-tab ${c === activeCategory ? 'active' : ''}" 
                    onclick="window.setCategory('${c}')">${c} (${count})</button>`;
            }).join('');
    }

    // ─── RENDER MENU ────────────────────────────────────────────────────────────
    function renderMenu() {
        const items = activeCategory === "All"
            ? allMenuItems
            : allMenuItems.filter(i => i.category === activeCategory);

        if (items.length === 0) {
            document.getElementById("menuContainer").innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:2rem">No items found.</p>`;
            return;
        }

        document.getElementById("menuContainer").innerHTML = `
            <div class="menu-grid">
                ${items.map(item => {
                    let groups = [];
                    try { groups = JSON.parse(item.modifierGroups || item.customizationOptions || "[]"); } catch(e) {}
                    const encoded = groups.length ? encodeURIComponent(JSON.stringify(groups)) : '';
                    return `
                        <div class="menu-item">
                            <div class="item-name">${item.name}</div>
                            <div class="item-desc">${item.description || ''}</div>
                            <div class="item-footer">
                                <span class="item-price">$${parseFloat(item.price).toFixed(2)}</span>
                                <button class="add-btn" onclick="window.openCustomizeModal('${item.itemId}','${item.name.replace(/'/g,"\\'")}',${item.price},'${encoded}')">+ Add</button>
                            </div>
                        </div>`;
                }).join('')}
            </div>`;
    }

    // ─── CUSTOMIZATION MODAL ────────────────────────────────────────────────────
    let _modalItem = null;
    let _modalQty  = 1;

    function cmUpdatePrice() {
        if (!_modalItem) return;
        const modal = document.getElementById('customizeModal');
        let modTotal = 0;
        modal.querySelectorAll('input:checked').forEach(inp => {
            modTotal += parseFloat(inp.dataset.price || 0);
        });
        const lineTotal = (_modalItem.price + modTotal) * _modalQty;
        document.getElementById('cmLivePrice').textContent = `$${lineTotal.toFixed(2)}`;
    }

    window.openCustomizeModal = function(itemId, name, price, encoded) {
        let groups = [];
        try { groups = encoded ? JSON.parse(decodeURIComponent(encoded)) : []; } catch(e) {}

        // No modifiers — straight to cart
        if (!groups.length) {
            cart.push({ itemId, name, price: parseFloat(price), modifiers: [], customization: '', quantity: 1 });
            renderCart(); return;
        }

        // Normalise legacy flat string array
        if (typeof groups[0] === 'string') {
            groups = [{ name:'Choose Option', required:true, min:1, max:1,
                options: groups.map(o => ({ name: o, price: 0 })) }];
        }

        _modalItem = { itemId, name, price: parseFloat(price) };
        _modalQty  = 1;
        document.getElementById('cmItemName').textContent = name;
        document.getElementById('cmQtyVal').textContent   = '1';

        document.getElementById('cmGroups').innerHTML = groups.map((g, gi) => {
            const req  = g.required !== false;
            const max  = g.max || 99;
            const type = max === 1 ? 'radio' : 'checkbox';
            const lbl  = `${g.name}${req
                ? ' <span style="color:var(--red)">*</span>'
                : ' <span style="color:var(--text-muted);font-size:.75rem">(optional)</span>'}`;
            const opts = g.options.map((opt, oi) => {
                const pid  = `cm_${gi}_${oi}`;
                const pLbl = opt.price > 0 ? ` <span style="color:var(--gold);font-size:.75rem">+$${opt.price.toFixed(2)}</span>` : '';
                return `<label class="cm-option" for="${pid}">
                    <input type="${type}" id="${pid}" name="cm_grp_${gi}"
                        value="${opt.name}" data-price="${opt.price || 0}"
                        onchange="cmUpdatePrice()">
                    <span>${opt.name}${pLbl}</span>
                </label>`;
            }).join('');
            return `<div class="cm-group" data-gi="${gi}" data-req="${req}" data-min="${g.min||0}" data-max="${max}">
                <div class="cm-group-label">${lbl}</div>
                <div class="cm-options">${opts}</div>
            </div>`;
        }).join('');

        cmUpdatePrice();
        document.getElementById('customizeModal').style.display = 'flex';
    };

    window.cmChangeQty = function(delta) {
        _modalQty = Math.max(1, _modalQty + delta);
        document.getElementById('cmQtyVal').textContent = _modalQty;
        cmUpdatePrice();
    };

    window.closeCustomizeModal = function() {
        document.getElementById('customizeModal').style.display = 'none';
        _modalItem = null; _modalQty = 1;
    };

    window.addFromModal = function() {
        if (!_modalItem) return;
        const groups = document.getElementById('cmGroups').querySelectorAll('.cm-group');
        const parts = [], modifiers = [];
        let valid = true, modTotal = 0;

        groups.forEach(grp => {
            const req     = grp.dataset.req === 'true';
            const checked = [...grp.querySelectorAll('input:checked')];
            if (req && !checked.length) {
                grp.querySelector('.cm-group-label').style.color = 'var(--red)';
                valid = false;
            } else {
                grp.querySelector('.cm-group-label').style.color = '';
                checked.forEach(inp => {
                    const p = parseFloat(inp.dataset.price || 0);
                    modifiers.push({ name: inp.value, price: p });
                    modTotal += p;
                    parts.push(inp.value);
                });
            }
        });

        if (!valid) return;

        const unitPrice = _modalItem.price + modTotal;
        for (let q = 0; q < _modalQty; q++) {
            cart.push({
                itemId:        _modalItem.itemId,
                name:          _modalItem.name,
                price:         unitPrice,
                modifiers,
                customization: parts.join(' · '),
                quantity:      1,
            });
        }
        renderCart();
        window.closeCustomizeModal();
    };

    // ─── CART ───────────────────────────────────────────────────────────────────
    window.addToCart = function(itemId, name, price, customization = '') {
        cart.push({ itemId, name, price: parseFloat(price), customization });
        renderCart();
    };

    window.removeFromCart = function(index) {
        cart.splice(index, 1);
        renderCart();
    };

    function renderCart() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById("cartCount").textContent = cart.length;
        document.getElementById("placeOrderBtn").disabled = cart.length === 0;

        if (cart.length === 0) {
            document.getElementById("cartContent").innerHTML = `
                <div class="cart-empty">
                    <span class="emoji">🌮</span>
                    <p>Add items to get started!</p>
                </div>`;
            return;
        }

        document.getElementById("cartContent").innerHTML = `
            ${cart.map((item, i) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        ${item.customization ? `<div class="cart-item-customization">${item.customization}</div>` : ''}
                    </div>
                    <span class="cart-item-price">$${item.price.toFixed(2)}</span>
                    <button class="remove-btn" onclick="window.removeFromCart(${i})">✕</button>
                </div>
            `).join('')}
            <div class="cart-total-row">
                <span>Total</span>
                <span class="total-amount">$${total.toFixed(2)}</span>
            </div>`;
    }

    // ─── ORDER CONFIRMATION MODAL ───────────────────────────────────────────────
    window.placeOrderWithConfirm = function() {
        const name      = document.getElementById("customerName").value.trim();
        const orderType = document.getElementById("orderType").value;
        const tableNumber = document.getElementById("tableNumber").value;

        // Run the same upfront validation so modal only shows when form is ready
        if (!name)      { alert("Please enter your name."); return; }
        if (!orderType) { alert("Please select an order type."); return; }
        if (orderType === "Dine-In" && !tableNumber) { alert("Please select your table."); return; }
        if (cart.length === 0) { alert("Your cart is empty!"); return; }

        const total = cart.reduce((s, i) => s + i.price, 0);
        const itemRows = cart.map(i => `
            <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #2a2a2a;">
                <span style="color:#f0f0f0;font-size:14px;">
                    ${i.name}
                    ${i.customization ? `<br><span style="color:#888;font-size:12px;">${i.customization}</span>` : ''}
                </span>
                <span style="color:#c8a951;font-weight:700;white-space:nowrap;margin-left:12px;">$${i.price.toFixed(2)}</span>
            </div>`).join('');

        const orderMeta = orderType === 'Dine-In'
            ? `Dine-In · Table ${tableNumber}`
            : orderType;

        // Build modal
        const overlay = document.createElement('div');
        overlay.id = 'orderConfirmOverlay';
        overlay.style.cssText = `
            position:fixed;inset:0;background:rgba(0,0,0,0.75);
            z-index:99999;display:flex;align-items:center;justify-content:center;
            padding:16px;animation:confirmFadeIn .2s ease;
        `;
        overlay.innerHTML = `
            <div style="
                background:#1a1a1a;border:1px solid #333;border-radius:20px;
                padding:28px 24px;width:100%;max-width:420px;
                box-shadow:0 20px 60px rgba(0,0,0,0.6);
            ">
                <h2 style="margin:0 0 4px;color:#f0f0f0;font-size:18px;">Confirm Your Order</h2>
                <p style="margin:0 0 16px;color:#888;font-size:13px;">
                    ${name} &nbsp;·&nbsp; ${orderMeta}
                </p>

                <div style="margin-bottom:16px;">
                    ${itemRows}
                </div>

                <div style="display:flex;justify-content:space-between;align-items:center;
                            padding:10px 0;border-top:1px solid #333;margin-bottom:20px;">
                    <span style="color:#f0f0f0;font-weight:700;">Total</span>
                    <span style="color:#c8a951;font-size:20px;font-weight:700;">$${total.toFixed(2)}</span>
                </div>

                <div style="display:flex;gap:10px;">
                    <button id="confirmCancelBtn" style="
                        flex:1;padding:14px;border-radius:12px;border:1.5px solid #444;
                        background:transparent;color:#aaa;font-size:14px;cursor:pointer;
                        font-family:inherit;transition:background .15s;
                    ">Go Back</button>
                    <button id="confirmPlaceBtn" style="
                        flex:2;padding:14px;border-radius:12px;border:none;
                        background:#D62828;color:#fff;font-size:15px;font-weight:700;
                        cursor:pointer;font-family:inherit;transition:background .15s;
                    ">Place Order ✓</button>
                </div>
            </div>
        `;

        // Add fade-in keyframe once
        if (!document.getElementById('confirmModalStyle')) {
            const s = document.createElement('style');
            s.id = 'confirmModalStyle';
            s.textContent = '@keyframes confirmFadeIn { from { opacity:0; } to { opacity:1; } }';
            document.head.appendChild(s);
        }

        document.body.appendChild(overlay);

        overlay.querySelector('#confirmCancelBtn').onclick = () => overlay.remove();
        overlay.querySelector('#confirmPlaceBtn').onclick  = () => {
            overlay.remove();
            window.placeOrder();
        };

        // Tap outside to dismiss
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    };

    // ─── PLACE ORDER ────────────────────────────────────────────────────────────
    window.placeOrder = async function() {
        const name = document.getElementById("customerName").value.trim();
        const orderType = document.getElementById("orderType").value;
        const tableNumber = document.getElementById("tableNumber").value;
        const specialInstructions = document.getElementById("specialInstructions").value.trim();
        const phone = document.getElementById("customerPhone").value.trim();
        const smsConsent = document.getElementById("smsConsent")?.checked || false;

        if (!name) { alert("Please enter your name."); return; }
        if (!orderType) { alert("Please select an order type."); return; }
        if (orderType === "Dine-In" && !tableNumber) { alert("Please select your table."); return; }
        if (cart.length === 0) { alert("Your cart is empty!"); return; }

        const btn = document.getElementById("placeOrderBtn");
        btn.disabled = true;
        btn.textContent = "Placing Order...";

        const orderId = `ORD-${Date.now()}`;
        const totalPrice = cart.reduce((s, i) => s + i.price, 0);
        const assignedServer = orderType === "Dine-In" ? (TABLE_ASSIGNMENTS[tableNumber] || "N/A") : "N/A";

        const mutation = `
            mutation CreateOrder($input: CreateOrderInput!) {
                createOrder(input: $input) {
                    id orderId customerName status
                }
            }
        `;

        try {
            await gql(mutation, {
                input: {
                    orderId,
                    customerName: name,
                    customerPhone: phone || null,
                    smsConsent: phone ? smsConsent : false,
                    orderType,
                    tableNumber: orderType === "Dine-In" ? tableNumber : null,
                    items: JSON.stringify(cart),
                    totalPrice,
                    specialInstructions,
                    status: "Pending",
                    assignedServer,
                    source: "Restaurant",
                    timestamp: new Date().toISOString()
                }
            });

            document.getElementById("mainContent").style.display = "none";
            document.getElementById("confirmationScreen").style.display = "block";
            document.getElementById("confirmOrderNumber").textContent = orderId;
            document.getElementById("trackOrderLink").href = `track-order.html?orderId=${orderId}`;

        } catch (err) {
            alert("Error placing order: " + err.message);
            btn.disabled = false;
            btn.textContent = "Place Order";
        }
    };

    // ─── CATEGORY SWITCH ────────────────────────────────────────────────────────
    window.setCategory = function(cat) {
        activeCategory = cat;
        renderCategoryTabs();
        renderMenu();
    };

    // ─── INIT ───────────────────────────────────────────────────────────────────
    loadMenu();

    window.toggleTable = function() {
        const t = document.getElementById("orderType").value;
        document.getElementById("tableGroup").style.display = t === "Dine-In" ? "block" : "none";
    };

    window.scrollToCart = function() {
        document.getElementById("cartSection").scrollIntoView({ behavior: "smooth" });
    };
</script>

<!-- AI Chat Widget -->

<div id="customizeModal" onclick="if(event.target===this)window.closeCustomizeModal()">
  <div class="cm-card">
    <div class="cm-header">
      <h3 id="cmItemName"></h3>
    </div>
    <div id="cmGroups"></div>
    <div class="cm-qty-row">
      <span style="font-size:.85rem;color:var(--text-muted);">Quantity</span>
      <div class="cm-qty-ctrl">
        <button class="cm-qty-btn" onclick="window.cmChangeQty(-1)">−</button>
        <span id="cmQtyVal">1</span>
        <button class="cm-qty-btn" onclick="window.cmChangeQty(1)">+</button>
      </div>
    </div>
    <div class="cm-actions">
      <button class="cm-cancel" onclick="window.closeCustomizeModal()">Cancel</button>
      <button class="cm-confirm" onclick="window.addFromModal()">Add to Cart — <span id="cmLivePrice">$0.00</span></button>
    </div>
  </div>
</div>

></script>
