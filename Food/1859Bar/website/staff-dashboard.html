<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - 1859 Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #1a2744;
            --red-dark: #0f1a30;
            --gold: #D4A843;
            --green: #8B4513;
            --green-light: #D4A843;
            --blue: #4da6ff;
            --bg: #0f0f0f;
            --bg2: #1a1a1a;
            --bg3: #242424;
            --border: #333;
            --text: #f0f0f0;
            --text-muted: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── LOGIN SCREEN ─────────────────────────────────────── */
        #loginScreen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            color: var(--red);
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .login-logo span { color: var(--gold); }
        .login-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg3);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: var(--red); }

        .login-btn {
            width: 100%;
            background: var(--red);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 10px;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.3rem;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }
        .login-btn:hover { background: var(--red-dark); }
        .login-btn:disabled { background: #444; cursor: not-allowed; }

        .login-error {
            background: #3a1a1a;
            border: 1px solid var(--red);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: #ff8888;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        /* NEW PASSWORD FORM */
        #newPasswordForm { display: none; }

        /* ── DASHBOARD ────────────────────────────────────────── */
        #dashboardScreen { display: none; }

        header {
            background: var(--bg2);
            border-bottom: 3px solid #D4A843;
            padding: 0.85rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.6rem;
            color: var(--red);
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .logo span { color: var(--gold); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .staff-badge {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .staff-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green-light);
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:hover { border-color: var(--red); color: var(--text); }

        .new-order-alert {
            background: var(--gold);
            color: #000;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            animation: pop 0.5s ease;
            display: none;
        }
        @keyframes pop { 0%{transform:scale(0.8)} 100%{transform:scale(1)} }

        /* STATS BAR */
        .stats-bar {
            display: flex;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .stat-chip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .stat-chip:hover { border-color: var(--red); }
        .stat-chip.active { background: var(--red); border-color: var(--red); color: white; }
        .stat-chip.active .chip-count { background: rgba(255,255,255,0.2); }

        .chip-count {
            background: var(--bg2);
            border-radius: 50px;
            padding: 0.1rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .chip-count.urgent { background: var(--red); color: white; }

        /* MAIN */
        .dashboard-main {
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .refresh-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .refresh-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refresh-btn:hover { border-color: var(--red); color: var(--text); }
        .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ORDER GRID */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        /* ORDER CARD */
        .order-card {
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: border-color 0.2s, transform 0.15s;
        }
        .order-card:hover { transform: translateY(-1px); }
        .order-card.status-Pending { border-left: 4px solid var(--gold); }
        .order-card.status-Preparing { border-left: 4px solid var(--blue); }
        .order-card.status-Ready { border-left: 4px solid var(--green-light); }
        .order-card.status-Completed { border-left: 4px solid #555; opacity: 0.7; }
        .order-card.urgent { animation: urgentPulse 2s ease-in-out infinite; }
        @keyframes urgentPulse {
            0%,100%{ border-color: var(--border); border-left-color: var(--gold); }
            50%{ border-color: var(--gold); border-left-color: var(--gold); }
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .order-id {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.1rem;
            color: var(--gold);
            letter-spacing: 1px;
        }

        .status-pill {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.25rem 0.7rem;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .pill-Pending { background: #3a3000; color: var(--gold); border: 1px solid var(--gold); }
        .pill-Preparing { background: #0a2040; color: var(--blue); border: 1px solid var(--blue); }
        .pill-Ready { background: #0a2a1a; color: var(--green-light); border: 1px solid var(--green-light); }
        .pill-Completed { background: #2a2a2a; color: #888; border: 1px solid #555; }

        .customer-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }
        .customer-name {
            font-size: 1.05rem;
            font-weight: 700;
        }
        .order-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .meta-tag {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.1rem 0.5rem;
            font-size: 0.75rem;
        }
        .meta-tag.dine-in { border-color: #4da6ff44; color: var(--blue); }
        .meta-tag.pickup { border-color: #f7b73144; color: var(--gold); }
        .meta-tag.delivery { border-color: #52b78844; color: var(--green-light); }

        .time-ago {
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .time-ago.warn { color: var(--gold); }
        .time-ago.urgent { color: var(--red); font-weight: 600; }

        .items-list {
            background: var(--bg3);
            border-radius: 8px;
            padding: 0.6rem 0.75rem;
            font-size: 0.82rem;
        }
        .order-item-row {
            display: flex;
            justify-content: space-between;
            padding: 0.2rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .order-item-row:last-child { border-bottom: none; }
        .item-text { color: var(--text); }
        .item-custom { color: var(--text-muted); font-size: 0.75rem; }
        .item-price { color: var(--green-light); font-weight: 600; white-space: nowrap; }

        .card-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 0.9rem;
            padding-top: 0.4rem;
            border-top: 1px solid var(--border);
        }
        .total-val { color: var(--green-light); }

        .special-note {
            background: #3a2a00;
            border: 1px solid #5a4000;
            border-radius: 6px;
            padding: 0.4rem 0.7rem;
            font-size: 0.8rem;
            color: #ffd060;
        }

        .eta-display {
            font-size: 0.8rem;
            color: var(--green-light);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* ACTION BUTTONS */
        .card-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 100px;
            border: none;
            padding: 0.6rem 0.5rem;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-start { background: #1a3a5a; color: var(--blue); border: 1px solid var(--blue); }
        .btn-start:hover { background: var(--blue); color: #000; }

        .btn-ready { background: #1a3a2a; color: var(--green-light); border: 1px solid var(--green-light); }
        .btn-ready:hover { background: var(--green-light); color: #000; }

        .btn-complete { background: #2a3a2a; color: #aaa; border: 1px solid #555; }
        .btn-complete:hover { background: #555; color: white; }

        .btn-cancel { background: #3a1a1a; color: #ff8888; border: 1px solid #ff4444; font-size: 0.75rem; flex: 0; padding: 0.6rem 0.7rem; }
        .btn-cancel:hover { background: var(--red); color: white; }

        .btn-back { background: var(--bg3); color: var(--text-muted); border: 1px solid var(--border); font-size: 0.75rem; flex: 0; padding: 0.6rem 0.7rem; }
        .btn-back:hover { border-color: var(--gold); color: var(--gold); }

        .btn-loading { opacity: 0.6; cursor: not-allowed; }

        /* ETA SETTER */
        .eta-setter {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            margin-top: 0.25rem;
        }
        .eta-setter select {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.5rem;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            flex: 1;
        }
        .eta-setter select:focus { outline: none; border-color: var(--green-light); }

        /* EMPTY / LOADING STATES */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

        .loading-overlay {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            border: 3px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @media (max-width: 600px) {
            .dashboard-main { padding: 1rem; }
            .orders-grid { grid-template-columns: 1fr; }
            .stats-bar { padding: 0.5rem 1rem; }
        }
    </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════════════════ -->
<div id="loginScreen">
    <div class="login-card">
        <div class="login-logo"><span>1859</span> Bar</div>
        <div class="login-subtitle">Staff Portal — Sign in to continue</div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Staff Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
        </form>

        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- ══════════════════════════════════════════════════
     DASHBOARD
══════════════════════════════════════════════════ -->
<div id="dashboardScreen">
    <header>
        <div class="logo"><span>1859</span> Bar <span style="color:#666; font-size:1rem; letter-spacing:0;">Staff</span></div>
        <div class="header-right">
            <div class="new-order-alert" id="newOrderAlert">🔔 New Order!</div>
            <div class="staff-badge">
                <div class="staff-dot"></div>
                <span>Staff</span>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
        </div>
    </header>

    <!-- Status filter tabs -->
    <div class="stats-bar">
        <div class="stat-chip active" id="chip-active" onclick="setFilter('active')">
            Active <span class="chip-count" id="count-active">0</span>
        </div>
        <div class="stat-chip" id="chip-Pending" onclick="setFilter('Pending')">
            ⏳ Pending <span class="chip-count urgent" id="count-Pending">0</span>
        </div>
        <div class="stat-chip" id="chip-Preparing" onclick="setFilter('Preparing')">
            👨‍🍳 Preparing <span class="chip-count" id="count-Preparing">0</span>
        </div>
        <div class="stat-chip" id="chip-Ready" onclick="setFilter('Ready')">
            🔔 Ready <span class="chip-count" id="count-Ready">0</span>
        </div>
        <div class="stat-chip" id="chip-Completed" onclick="setFilter('Completed')">
            ✅ Completed Today <span class="chip-count" id="count-Completed">0</span>
        </div>
    </div>

    <div class="dashboard-main">
        <div class="refresh-info">
            <span id="lastRefreshText">Loading orders...</span>
            <button class="refresh-btn" id="refreshBtn" onclick="loadOrders()">↻ Refresh</button>
        </div>
        <div class="orders-grid" id="ordersGrid">
            <div class="loading-overlay">
                <div class="spinner"></div>
                <p>Loading orders...</p>
            </div>
        </div>
    </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const APPSYNC_URL  = "https://d2zlzofjerf4hd6gltypy2rnlm.appsync-api.us-east-1.amazonaws.com/graphql";
const API_KEY      = "da2-6l2dtmahczbbnlp3m2vmgihqby";
const STAFF_PASSWORD = "1859Bar2025!"; // ← change this to your own password

// ── AUTH ─────────────────────────────────────────────────────────────────
function handleLogin(e) {
    e.preventDefault();
    const password = document.getElementById("loginPassword").value;
    if (password !== STAFF_PASSWORD) {
        showLoginError("Incorrect password. Try again.");
        document.getElementById("loginPassword").value = "";
        return;
    }
    sessionStorage.setItem("staffAuth", "1");
    showDashboard();
}

function handleLogout() {
    sessionStorage.removeItem("staffAuth");
    document.getElementById("dashboardScreen").style.display = "none";
    document.getElementById("loginScreen").style.display    = "flex";
    clearInterval(refreshInterval);
    document.getElementById("loginForm").reset();
}

function checkSession() {
    if (sessionStorage.getItem("staffAuth") === "1") {
        showDashboard();
    } else {
        showLoginScreen();
    }
}

function showLoginScreen() {
    document.getElementById("loginScreen").style.display    = "flex";
    document.getElementById("dashboardScreen").style.display = "none";
}

function showDashboard() {
    document.getElementById("loginScreen").style.display    = "none";
    document.getElementById("dashboardScreen").style.display = "block";
    startDashboard();
}

function showLoginError(msg) {
    const el = document.getElementById("loginError");
    el.textContent = msg;
    el.style.display = "block";
}
function hideLoginError() {
    document.getElementById("loginError").style.display = "none";
}

// ── GRAPHQL ───────────────────────────────────────────────────────────────
async function gql(query, variables = {}) {
    const res = await fetch(APPSYNC_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": API_KEY },
        body: JSON.stringify({ query, variables })
    });
    const json = await res.json();
    if (json.errors) throw new Error(json.errors[0].message);
    return json.data;
}

// ── STATE ─────────────────────────────────────────────────────────────────
let allOrders      = [];
let activeFilter   = "active";
let refreshInterval = null;
let prevPendingIds = new Set();

// ── LOAD ORDERS ───────────────────────────────────────────────────────────
async function loadOrders() {
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("spinning");

    const query = `
        query ListAllOrders {
            listOrders(limit: 200, filter: { source: { eq: "Bar1859" } }) {
                items {
                    id orderId customerName orderType tableNumber items totalPrice
                    specialInstructions status assignedServer timestamp estimatedReadyTime source
                }
            }
        }
    `;

    try {
        const data = await gql(query);
        const orders = data.listOrders.items || [];

        // Sort: Pending first, then Preparing, Ready, Completed; within each group oldest first
        const rank = { Pending: 0, Preparing: 1, Ready: 2, Completed: 3 };
        orders.sort((a, b) => {
            const r = (rank[a.status] ?? 4) - (rank[b.status] ?? 4);
            return r !== 0 ? r : new Date(a.timestamp) - new Date(b.timestamp);
        });

        // Detect newly arrived Pending orders
        const newPendingIds = new Set(orders.filter(o => o.status === "Pending").map(o => o.id));
        const hasNew = [...newPendingIds].some(id => !prevPendingIds.has(id));
        if (hasNew && prevPendingIds.size > 0) flashNewOrderAlert();
        prevPendingIds = newPendingIds;

        allOrders = orders;
        updateCounts();
        renderOrders();

        const now = new Date();
        document.getElementById("lastRefreshText").textContent =
            `Last refreshed at ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
    } catch (err) {
        document.getElementById("ordersGrid").innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">⚠️</div>
                <p style="color:#ff8888">${err.message}</p>
            </div>`;
    } finally {
        btn.classList.remove("spinning");
    }
}

function updateCounts() {
    const today = new Date().toDateString();
    const counts = { Pending: 0, Preparing: 0, Ready: 0, Completed: 0 };
    allOrders.forEach(o => {
        if (o.status === "Completed") {
            if (new Date(o.timestamp).toDateString() === today) counts.Completed++;
        } else {
            counts[o.status] = (counts[o.status] || 0) + 1;
        }
    });
    const active = counts.Pending + counts.Preparing + counts.Ready;
    document.getElementById("count-active").textContent    = active;
    document.getElementById("count-Pending").textContent   = counts.Pending;
    document.getElementById("count-Preparing").textContent = counts.Preparing;
    document.getElementById("count-Ready").textContent     = counts.Ready;
    document.getElementById("count-Completed").textContent = counts.Completed;
}

function setFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll(".stat-chip").forEach(c => c.classList.remove("active"));
    document.getElementById(`chip-${filter}`).classList.add("active");
    renderOrders();
}

function renderOrders() {
    const today   = new Date().toDateString();
    let filtered;

    if (activeFilter === "active") {
        filtered = allOrders.filter(o => o.status !== "Completed");
    } else if (activeFilter === "Completed") {
        filtered = allOrders.filter(o =>
            o.status === "Completed" && new Date(o.timestamp).toDateString() === today
        );
    } else {
        filtered = allOrders.filter(o => o.status === activeFilter);
    }

    const grid = document.getElementById("ordersGrid");

    if (filtered.length === 0) {
        const msgs = {
            active:    { icon: "🌮", text: "No active orders right now." },
            Pending:   { icon: "⏳", text: "No pending orders." },
            Preparing: { icon: "👨‍🍳", text: "Nothing in preparation." },
            Ready:     { icon: "🔔", text: "No orders ready." },
            Completed: { icon: "✅", text: "No completed orders today." }
        };
        const m = msgs[activeFilter] || msgs.active;
        grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">${m.icon}</div>
                <p>${m.text}</p>
            </div>`;
        return;
    }

    grid.innerHTML = filtered.map(order => buildOrderCard(order)).join('');
}

function buildOrderCard(order) {
    const ageMs  = Date.now() - new Date(order.timestamp);
    const ageMin = Math.floor(ageMs / 60000);
    const timeAgoStr = ageMin < 1 ? "just now" : ageMin < 60 ? `${ageMin}m ago` : `${Math.floor(ageMin/60)}h ${ageMin%60}m ago`;
    const timeClass  = ageMin >= 20 ? "urgent" : ageMin >= 10 ? "warn" : "";
    const isUrgent   = order.status === "Pending" && ageMin >= 10;

    let items = [];
    try { items = JSON.parse(order.items || "[]"); } catch(e) {}

    const typeClass = order.orderType === "Dine-In" ? "dine-in" : order.orderType === "Pickup" ? "pickup" : "delivery";
    const tableTag  = order.tableNumber ? `<span class="meta-tag">Table ${order.tableNumber}</span>` : '';
    const serverTag = order.assignedServer && order.assignedServer !== "N/A"
        ? `<span class="meta-tag">🧑 ${order.assignedServer}</span>` : '';

    const itemsHtml = items.map(i => `
        <div class="order-item-row">
            <div>
                <span class="item-text">${i.name}</span>
                ${i.customization ? `<div class="item-custom">${i.customization}</div>` : ''}
            </div>
            <span class="item-price">$${parseFloat(i.price).toFixed(2)}</span>
        </div>`).join('');

    const specialHtml = order.specialInstructions
        ? `<div class="special-note">⚠️ ${order.specialInstructions}</div>` : '';

    const etaHtml = order.estimatedReadyTime && order.status === "Preparing"
        ? `<div class="eta-display">⏱ Ready at ${new Date(order.estimatedReadyTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>` : '';

    const actionsHtml = buildActions(order);

    return `
        <div class="order-card status-${order.status}${isUrgent ? ' urgent' : ''}" id="card-${order.id}">
            <div class="card-header">
                <span class="order-id">${order.orderId}</span>
                <span class="status-pill pill-${order.status}">${order.status}</span>
            </div>
            <div class="customer-info">
                <span class="customer-name">${order.customerName}</span>
                <span class="time-ago ${timeClass}">${timeAgoStr}</span>
            </div>
            <div class="order-meta">
                <span class="meta-tag ${typeClass}">${order.orderType}</span>
                ${tableTag}${serverTag}
            </div>
            <div class="items-list">
                ${itemsHtml}
                <div class="card-total">
                    <span>Total</span>
                    <span class="total-val">$${parseFloat(order.totalPrice).toFixed(2)}</span>
                </div>
            </div>
            ${specialHtml}
            ${etaHtml}
            ${actionsHtml}
        </div>`;
}

function buildActions(order) {
    const id = order.id;
    if (order.status === "Pending") {
        return `
            <div class="card-actions">
                <button class="action-btn btn-start" onclick="updateStatus('${id}', 'Preparing')">
                    👨‍🍳 Start Preparing
                </button>
                <button class="action-btn btn-cancel" onclick="cancelOrder('${id}')">✕</button>
            </div>`;
    }
    if (order.status === "Preparing") {
        return `
            <div class="eta-setter">
                <select id="eta-${id}">
                    <option value="">Set ready time...</option>
                    ${[5,10,15,20,25,30,45,60].map(m => {
                        const t = new Date(Date.now() + m * 60000);
                        return `<option value="${t.toISOString()}">~${m} min (${t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})})</option>`;
                    }).join('')}
                </select>
            </div>
            <div class="card-actions">
                <button class="action-btn btn-ready" onclick="updateStatus('${id}', 'Ready', document.getElementById('eta-${id}')?.value)">
                    🔔 Mark Ready
                </button>
                <button class="action-btn btn-back" onclick="updateStatus('${id}', 'Pending')">↩</button>
                <button class="action-btn btn-cancel" onclick="cancelOrder('${id}')">✕</button>
            </div>`;
    }
    if (order.status === "Ready") {
        return `
            <div class="card-actions">
                <button class="action-btn btn-complete" onclick="updateStatus('${id}', 'Completed')">
                    ✅ Mark Complete
                </button>
                <button class="action-btn btn-back" onclick="updateStatus('${id}', 'Preparing')">↩</button>
            </div>`;
    }
    return ''; // Completed — no actions
}

// ── UPDATE STATUS ─────────────────────────────────────────────────────────
async function updateStatus(id, newStatus, etaIso) {
    const card = document.getElementById(`card-${id}`);
    if (card) card.style.opacity = "0.5";

    const mutation = `
        mutation UpdateOrder($input: UpdateOrderInput!) {
            updateOrder(input: $input) {
                id orderId status estimatedReadyTime
            }
        }
    `;
    const input = { id, status: newStatus };
    if (etaIso) input.estimatedReadyTime = etaIso;

    try {
        await gql(mutation, { input });
        await loadOrders();
    } catch (err) {
        alert("Error updating order: " + err.message);
        if (card) card.style.opacity = "1";
    }
}

async function cancelOrder(id) {
    if (!confirm("Cancel this order?")) return;
    await updateStatus(id, "Cancelled");
}

// ── NEW ORDER ALERT ───────────────────────────────────────────────────────
function flashNewOrderAlert() {
    const alert = document.getElementById("newOrderAlert");
    alert.style.display = "flex";
    setTimeout(() => { alert.style.display = "none"; }, 5000);
    try { new Audio("data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA").play(); } catch(e) {}
}

// ── DASHBOARD START ───────────────────────────────────────────────────────
function startDashboard() {
    loadOrders();
    clearInterval(refreshInterval);
    refreshInterval = setInterval(loadOrders, 30000);
}

// ── INIT ─────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
    // If Cognito isn't configured yet, fall back to showing login normally
    // (user will get an auth error on submit until they set the pool IDs)
    checkSession();
});
</script>
