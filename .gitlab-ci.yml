stages:
  - validate
  - plan
  - apply

variables:
  TF_DIR: terraform
  AWS_DEFAULT_REGION: us-east-1

# Cache Terraform plugins between jobs
cache:
  key: terraform
  paths:
    - ${TF_DIR}/.terraform/

# ── VALIDATE ──────────────────────────────────────────────────────────────────
terraform:validate:
  stage: validate
  image: hashicorp/terraform:1.6
  script:
    - cd ${TF_DIR}
    - terraform init -backend=false
    - terraform validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

# ── PLAN ──────────────────────────────────────────────────────────────────────
terraform:plan:
  stage: plan
  image: hashicorp/terraform:1.6
  script:
    - cd ${TF_DIR}
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - ${TF_DIR}/tfplan
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

# ── APPLY (only on main/master, manual trigger) ────────────────────────────────
terraform:apply:
  stage: apply
  image: hashicorp/terraform:1.6
  script:
    - cd ${TF_DIR}
    - terraform init
    - terraform apply -auto-approve
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      when: manual
  environment:
    name: production
