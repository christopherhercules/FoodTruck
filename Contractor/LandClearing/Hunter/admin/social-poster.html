<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Poster — Hunter Land Clearing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1E3D0F;
      --green-mid:   #2E5E12;
      --green-light: #4A8A20;
      --amber:       #D4821A;
      --amber-light: #F0A030;
      --bg:          #F4F6F0;
      --card:        #FFFFFF;
      --text:        #1A2410;
      --text-mid:    #4A5C3A;
      --border:      #D8E0D0;
      --red:         #C0392B;
      --green-ok:    #1E7B34;
    }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--green-dark);
    }
    .login-card {
      background: white; border-radius: 16px; padding: 48px 40px; width: 360px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3); text-align: center;
    }
    .login-logo { font-size: 2.5rem; margin-bottom: 8px; }
    .login-card h1 { font-size: 1.3rem; color: var(--green-dark); margin-bottom: 4px; }
    .login-card p  { font-size: .9rem; color: var(--text-mid); margin-bottom: 28px; }
    .login-card input {
      width: 100%; padding: 12px 16px; border: 2px solid var(--border);
      border-radius: 8px; font-size: 1rem; margin-bottom: 14px; outline: none;
    }
    .login-card input:focus { border-color: var(--green-mid); }
    .login-btn {
      width: 100%; padding: 13px; background: var(--green-mid); color: white;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .login-btn:hover { background: var(--green-dark); }
    .login-error { color: var(--red); font-size: .85rem; margin-top: 10px; }

    /* ── HEADER ── */
    .header {
      background: var(--green-dark); color: white; padding: 16px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .header-icon { font-size: 1.6rem; }
    .header h1  { font-size: 1.2rem; font-weight: 700; }
    .header p   { font-size: .8rem; opacity: .7; }

    /* ── MAIN ── */
    .main { max-width: 720px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── UPLOAD ZONE ── */
    .upload-zone {
      border: 2.5px dashed var(--border); border-radius: 16px;
      padding: 48px 24px; text-align: center; background: var(--card);
      cursor: pointer; transition: border-color .2s, background .2s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--green-mid); background: #F0F5EC;
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { font-size: 2.8rem; margin-bottom: 12px; }
    .upload-zone h2 { font-size: 1.1rem; color: var(--green-dark); margin-bottom: 6px; }
    .upload-zone p  { font-size: .9rem; color: var(--text-mid); }
    .upload-btn-hint {
      display: inline-block; margin-top: 14px; padding: 8px 20px;
      background: var(--green-mid); color: white; border-radius: 8px;
      font-size: .9rem; font-weight: 600; pointer-events: none;
    }

    /* ── PREVIEW ── */
    .preview-wrap { margin-top: 24px; display: none; }
    .preview-wrap img {
      width: 100%; max-height: 420px; object-fit: contain;
      border-radius: 12px; border: 1px solid var(--border);
      background: #000;
    }
    .preview-actions {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px;
    }
    .preview-filename { font-size: .85rem; color: var(--text-mid); }
    .btn-ghost {
      background: none; border: 1.5px solid var(--border); padding: 6px 14px;
      border-radius: 6px; font-size: .85rem; cursor: pointer; color: var(--text-mid);
      transition: border-color .2s;
    }
    .btn-ghost:hover { border-color: var(--amber); color: var(--amber); }

    /* ── LOADING ── */
    .loading-wrap { margin-top: 28px; display: none; text-align: center; padding: 32px; }
    .spinner {
      display: inline-block; width: 40px; height: 40px;
      border: 4px solid var(--border); border-top-color: var(--green-mid);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-wrap p { margin-top: 14px; color: var(--text-mid); font-size: .95rem; }

    /* ── CAPTIONS ── */
    .captions-wrap { margin-top: 28px; display: none; }
    .captions-wrap h2 { font-size: 1.05rem; font-weight: 700; color: var(--green-dark); margin-bottom: 14px; }

    .caption-card {
      background: var(--card); border: 2px solid var(--border); border-radius: 12px;
      padding: 16px 18px; margin-bottom: 14px; cursor: pointer;
      transition: border-color .15s;
    }
    .caption-card.selected { border-color: var(--green-mid); background: #F0F5EC; }
    .caption-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .caption-radio {
      width: 18px; height: 18px; accent-color: var(--green-mid);
      cursor: pointer; flex-shrink: 0;
    }
    .caption-label { font-size: .8rem; font-weight: 700; color: var(--text-mid); text-transform: uppercase; letter-spacing: .04em; }
    .caption-text {
      width: 100%; border: none; resize: vertical; font-size: .95rem;
      line-height: 1.5; color: var(--text); background: transparent;
      font-family: inherit; min-height: 100px; outline: none;
    }

    /* ── POST BUTTON ── */
    .post-wrap { margin-top: 24px; display: none; }
    .btn-post {
      width: 100%; padding: 16px; background: var(--amber); color: white;
      border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; transition: background .2s; display: flex; align-items: center;
      justify-content: center; gap: 10px;
    }
    .btn-post:hover:not(:disabled) { background: var(--amber-light); }
    .btn-post:disabled { opacity: .5; cursor: not-allowed; }

    /* ── RESULT ── */
    .result-wrap { margin-top: 20px; display: none; }
    .result-row {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px;
      border-radius: 10px; margin-bottom: 10px; font-size: .95rem; font-weight: 500;
    }
    .result-row.ok  { background: #EBF5ED; color: var(--green-ok); border: 1.5px solid #A8D5B0; }
    .result-row.err { background: #FDECEA; color: var(--red);      border: 1.5px solid #F5B4B0; }
    .result-icon { font-size: 1.3rem; flex-shrink: 0; }
    .result-detail { font-size: .8rem; font-weight: 400; margin-top: 2px; opacity: .8; word-break: break-all; }

    .divider { border: none; border-top: 1.5px solid var(--border); margin: 28px 0; }

    /* ── GENERATE AGAIN ── */
    .btn-again {
      background: none; border: 1.5px solid var(--green-mid); color: var(--green-mid);
      padding: 8px 18px; border-radius: 8px; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: all .2s; margin-bottom: 14px;
    }
    .btn-again:hover { background: var(--green-mid); color: white; }
  </style>
</head>
<body>

<!-- ── LOGIN GATE ─────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🌿</div>
    <h1>Social Poster</h1>
    <p>Hunter Land Clearing — Admin Only</p>
    <input type="password" id="pw-input" placeholder="Password" />
    <button class="login-btn" onclick="checkLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────────────────── -->
<div id="app" style="display:none;">

  <div class="header">
    <div class="header-icon">🌿</div>
    <div>
      <h1>Social Poster</h1>
      <p>Hunter Land Clearing — Post to Facebook & Instagram</p>
    </div>
  </div>

  <div class="main">

    <!-- Upload zone -->
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="photo-input" accept="image/*" />
      <div class="upload-icon">📷</div>
      <h2>Upload a job photo</h2>
      <p>Drag & drop or click to browse</p>
      <div class="upload-btn-hint">Choose Photo</div>
    </div>

    <!-- Preview -->
    <div class="preview-wrap" id="preview-wrap">
      <img id="preview-img" src="" alt="Preview" />
      <div class="preview-actions">
        <span class="preview-filename" id="preview-filename"></span>
        <button class="btn-ghost" onclick="resetAll()">Change Photo</button>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading-wrap" id="loading-wrap">
      <div class="spinner"></div>
      <p>AI is analyzing your photo and writing captions…</p>
    </div>

    <!-- Captions -->
    <div class="captions-wrap" id="captions-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <h2 style="margin:0;">Pick a caption</h2>
        <button class="btn-again" id="btn-again" onclick="regenerateCaptions()">↻ Regenerate</button>
      </div>
      <div id="captions-list"></div>
    </div>

    <!-- Post button -->
    <div class="post-wrap" id="post-wrap">
      <button class="btn-post" id="btn-post" onclick="postNow()">
        <span>📤</span>
        <span>Post to Facebook &amp; Instagram</span>
      </button>
    </div>

    <!-- Result -->
    <div class="result-wrap" id="result-wrap"></div>

  </div>
</div>

<script>
const SERVER = 'https://foodtruck-cymz.onrender.com';
const PW     = 'Hunter2025!';

let currentFile     = null;
let currentImageUrl = null;
let selectedCaption = null;

// ── Auth ─────────────────────────────────────────────────────────────────────
function checkLogin() {
  const val = document.getElementById('pw-input').value;
  if (val === PW) {
    sessionStorage.setItem('hlc_social_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password.';
    document.getElementById('pw-input').value = '';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkLogin();
});

if (sessionStorage.getItem('hlc_social_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ── Upload / drag-drop ────────────────────────────────────────────────────────
const zone  = document.getElementById('upload-zone');
const input = document.getElementById('photo-input');

zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', ()  => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
});

input.addEventListener('change', () => {
  if (input.files[0]) handleFile(input.files[0]);
});

function handleFile(file) {
  currentFile = file;
  currentImageUrl = null;
  selectedCaption = null;

  // Show preview
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('preview-img').src = e.target.result;
  };
  reader.readAsDataURL(file);

  document.getElementById('upload-zone').style.display  = 'none';
  document.getElementById('preview-wrap').style.display = 'block';
  document.getElementById('preview-filename').textContent = file.name;

  generateCaptions();
}

// ── Caption generation ────────────────────────────────────────────────────────
async function generateCaptions() {
  show('loading-wrap');
  hide('captions-wrap');
  hide('post-wrap');
  hide('result-wrap');
  selectedCaption = null;

  const form = new FormData();
  form.append('photo', currentFile);

  try {
    const res  = await fetch(`${SERVER}/hunter/social/caption`, { method: 'POST', body: form });
    const data = await res.json();

    if (!res.ok || !data.ok) throw new Error(data.error || 'Caption generation failed');

    currentImageUrl = data.imageUrl;
    renderCaptions(data.captions);

    hide('loading-wrap');
    show('captions-wrap');
  } catch (err) {
    hide('loading-wrap');
    showError(err.message);
  }
}

function regenerateCaptions() {
  if (!currentFile) return;
  generateCaptions();
}

function renderCaptions(captions) {
  const list = document.getElementById('captions-list');
  list.innerHTML = '';

  captions.forEach((text, i) => {
    const card = document.createElement('div');
    card.className = 'caption-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="caption-card-header">
        <input type="radio" class="caption-radio" name="caption" id="radio-${i}" value="${i}" />
        <label class="caption-label" for="radio-${i}">Option ${i + 1}</label>
      </div>
      <textarea class="caption-text" id="caption-text-${i}" rows="5">${escHtml(text)}</textarea>
    `;
    list.appendChild(card);

    card.addEventListener('click', e => {
      if (e.target.tagName === 'TEXTAREA') return;
      document.getElementById(`radio-${i}`).checked = true;
      selectCaption(i);
    });

    document.getElementById(`radio-${i}`).addEventListener('change', () => selectCaption(i));
  });
}

function selectCaption(i) {
  document.querySelectorAll('.caption-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`card-${i}`).classList.add('selected');
  selectedCaption = i;
  show('post-wrap');
  hide('result-wrap');
}

// ── Post ──────────────────────────────────────────────────────────────────────
async function postNow() {
  if (selectedCaption === null || !currentImageUrl) return;

  const caption = document.getElementById(`caption-text-${selectedCaption}`).value.trim();
  if (!caption) { alert('Caption is empty.'); return; }

  const btn = document.getElementById('btn-post');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:22px;height:22px;border-width:3px;"></span><span>Posting…</span>';

  try {
    const res  = await fetch(`${SERVER}/hunter/social/post`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ imageUrl: currentImageUrl, caption }),
    });
    const data = await res.json();
    renderResult(data);
  } catch (err) {
    renderResult({ facebook: { error: err.message }, instagram: { error: err.message } });
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>📤</span><span>Post to Facebook &amp; Instagram</span>';
  }
}

function renderResult(data) {
  const wrap = document.getElementById('result-wrap');
  const fbOk = data.facebook && !data.facebook.error;
  const igOk = data.instagram && !data.instagram.error;

  wrap.innerHTML = `
    <div class="result-row ${fbOk ? 'ok' : 'err'}">
      <span class="result-icon">${fbOk ? '✅' : '❌'}</span>
      <div>
        <div>Facebook — ${fbOk ? 'Posted successfully' : 'Failed'}</div>
        ${fbOk
          ? `<div class="result-detail">Post ID: ${data.facebook.postId}</div>`
          : `<div class="result-detail">${escHtml(data.facebook?.error || 'Unknown error')}</div>`}
      </div>
    </div>
    <div class="result-row ${igOk ? 'ok' : 'err'}">
      <span class="result-icon">${igOk ? '✅' : '❌'}</span>
      <div>
        <div>Instagram — ${igOk ? 'Posted successfully' : 'Failed'}</div>
        ${igOk
          ? `<div class="result-detail">Media ID: ${data.instagram.postId}</div>`
          : `<div class="result-detail">${escHtml(data.instagram?.error || 'Unknown error')}</div>`}
      </div>
    </div>
    ${(fbOk || igOk) ? `<p style="text-align:center;margin-top:14px;font-size:.9rem;color:var(--text-mid);">
      <a href="#" onclick="resetAll();return false;" style="color:var(--green-mid);font-weight:600;">Post another photo →</a>
    </p>` : ''}
  `;
  show('result-wrap');
}

function showError(msg) {
  const wrap = document.getElementById('result-wrap');
  wrap.innerHTML = `<div class="result-row err"><span class="result-icon">❌</span><div>${escHtml(msg)}</div></div>`;
  show('result-wrap');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function resetAll() {
  currentFile     = null;
  currentImageUrl = null;
  selectedCaption = null;
  document.getElementById('photo-input').value = '';
  document.getElementById('preview-img').src    = '';
  document.getElementById('captions-list').innerHTML = '';
  show('upload-zone');
  hide('preview-wrap');
  hide('loading-wrap');
  hide('captions-wrap');
  hide('post-wrap');
  hide('result-wrap');
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
