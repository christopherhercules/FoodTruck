<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Social Poster — Hunter Land Clearing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1E3D0F;
      --green-mid:   #2E5E12;
      --green-light: #4A8A20;
      --amber:       #D4821A;
      --amber-light: #F0A030;
      --bg:          #F2F5EE;
      --card:        #FFFFFF;
      --text:        #1A2410;
      --text-mid:    #4A5C3A;
      --border:      #D0DAC4;
      --red:         #C0392B;
      --green-ok:    #1E7B34;
    }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; -webkit-text-size-adjust: 100%;
    }

    /* ── LOGIN ─────────────────────────────────────────────────────── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--green-dark) 0%, #2a5a10 100%);
      padding: 24px;
    }
    .login-card {
      background: white; border-radius: 20px;
      padding: 40px 32px; width: 100%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35); text-align: center;
    }
    .login-logo {
      width: 70px; height: 70px; border-radius: 18px;
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 18px;
    }
    .login-card h1 { font-size: 1.3rem; color: var(--green-dark); margin-bottom: 4px; font-weight: 700; }
    .login-card p  { font-size: .88rem; color: var(--text-mid); margin-bottom: 28px; }
    .login-card input {
      width: 100%; padding: 15px 16px;
      border: 2px solid var(--border); border-radius: 12px;
      font-size: 16px; margin-bottom: 14px; outline: none;
      font-family: inherit; color: var(--text);
      transition: border-color .2s;
    }
    .login-card input:focus { border-color: var(--green-mid); }
    .login-btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      color: white; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      font-family: inherit; -webkit-tap-highlight-color: transparent;
    }
    .login-error { color: var(--red); font-size: .85rem; margin-top: 12px; min-height: 20px; }

    /* ── APP ───────────────────────────────────────────────────────── */
    #app { display: none; }

    /* ── HEADER ────────────────────────────────────────────────────── */
    .header {
      background: var(--green-dark); color: white;
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .header-icon {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
    }
    .header-text h1  { font-size: 1rem; font-weight: 700; }
    .header-text p   { font-size: .75rem; opacity: .7; margin-top: 1px; }

    /* ── MAIN ──────────────────────────────────────────────────────── */
    .main { padding: 20px 16px 80px; max-width: 600px; margin: 0 auto; }

    /* ── UPLOAD ZONE ───────────────────────────────────────────────── */
    .upload-zone {
      background: var(--card); border: 2.5px dashed var(--border);
      border-radius: 18px; padding: 40px 20px;
      text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative; -webkit-tap-highlight-color: transparent;
    }
    .upload-zone.drag-over { border-color: var(--green-mid); background: #EEF5E8; }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%; z-index: 2;
    }
    .upload-icon { font-size: 3.2rem; margin-bottom: 14px; }
    .upload-zone h2 { font-size: 1.15rem; color: var(--green-dark); font-weight: 700; margin-bottom: 6px; }
    .upload-zone p  { font-size: .88rem; color: var(--text-mid); margin-bottom: 20px; }
    .upload-btn {
      display: inline-block; padding: 14px 32px;
      background: var(--green-mid); color: white;
      border-radius: 12px; font-size: 1rem; font-weight: 700;
      pointer-events: none;
    }

    /* ── CAMERA SHORTCUT ───────────────────────────────────────────── */
    .camera-row {
      display: flex; gap: 10px; margin-top: 14px;
    }
    .camera-btn {
      flex: 1; padding: 14px; border-radius: 12px;
      border: 2px solid var(--border); background: white;
      font-size: .92rem; font-weight: 600; color: var(--text-mid);
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 8px; position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .camera-btn input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .camera-btn:active { background: #f0f0f0; }

    /* ── PREVIEW ───────────────────────────────────────────────────── */
    .preview-wrap { display: none; margin-bottom: 4px; }
    .preview-img-wrap {
      border-radius: 14px; overflow: hidden; border: 1px solid var(--border);
      background: #000; max-height: 320px;
    }
    .preview-img-wrap img { width: 100%; max-height: 320px; object-fit: contain; display: block; }
    .preview-actions {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; padding: 0 2px;
    }
    .preview-filename { font-size: .82rem; color: var(--text-mid); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }
    .btn-ghost {
      background: none; border: 1.5px solid var(--border);
      padding: 8px 16px; border-radius: 8px; font-size: .88rem;
      cursor: pointer; color: var(--text-mid); font-family: inherit;
      -webkit-tap-highlight-color: transparent; white-space: nowrap;
    }

    /* ── LOADING ───────────────────────────────────────────────────── */
    .loading-wrap { display: none; text-align: center; padding: 40px 20px; }
    .spinner {
      display: inline-block; width: 44px; height: 44px;
      border: 4px solid var(--border); border-top-color: var(--green-mid);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-wrap p { margin-top: 16px; color: var(--text-mid); font-size: .95rem; line-height: 1.5; }

    /* ── CAPTIONS ──────────────────────────────────────────────────── */
    .captions-wrap { display: none; margin-top: 20px; }
    .captions-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .captions-header h2 { font-size: 1.05rem; font-weight: 700; color: var(--green-dark); }
    .btn-again {
      background: none; border: 1.5px solid var(--green-mid);
      color: var(--green-mid); padding: 7px 14px; border-radius: 8px;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      font-family: inherit; -webkit-tap-highlight-color: transparent;
    }

    .caption-card {
      background: var(--card); border: 2px solid var(--border);
      border-radius: 14px; margin-bottom: 12px; cursor: pointer;
      transition: border-color .15s; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .caption-card.selected { border-color: var(--green-mid); background: #F0F7EA; }
    .caption-card-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px 10px;
    }
    .caption-radio {
      width: 20px; height: 20px; accent-color: var(--green-mid);
      cursor: pointer; flex-shrink: 0;
    }
    .caption-label { font-size: .8rem; font-weight: 700; color: var(--text-mid); text-transform: uppercase; letter-spacing: .04em; }
    .caption-text {
      width: 100%; border: none; resize: none;
      font-size: 16px; line-height: 1.55; color: var(--text);
      background: transparent; font-family: inherit;
      padding: 0 16px 16px; outline: none; min-height: 120px;
    }

    /* ── POST BUTTON ───────────────────────────────────────────────── */
    .post-wrap { display: none; margin-top: 20px; }
    .btn-post {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, #b86c10, var(--amber));
      color: white; border: none; border-radius: 14px;
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 20px rgba(212,130,26,0.35);
      font-family: inherit; -webkit-tap-highlight-color: transparent;
      transition: opacity .2s;
    }
    .btn-post:disabled { opacity: .5; cursor: not-allowed; }
    .btn-post:not(:disabled):active { opacity: .88; }

    /* ── RESULT ────────────────────────────────────────────────────── */
    .result-wrap { display: none; margin-top: 16px; }
    .result-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px; border-radius: 12px; margin-bottom: 10px; font-size: .95rem; font-weight: 600;
    }
    .result-row.ok  { background: #EBF5ED; color: var(--green-ok); border: 1.5px solid #A8D5B0; }
    .result-row.err { background: #FDECEA; color: var(--red);      border: 1.5px solid #F5B4B0; }
    .result-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: -1px; }
    .result-detail { font-size: .8rem; font-weight: 400; margin-top: 3px; opacity: .8; word-break: break-all; }
    .post-again {
      display: block; text-align: center; margin-top: 16px;
      font-size: .95rem; color: var(--green-mid); font-weight: 700;
      text-decoration: none; padding: 14px;
      background: white; border-radius: 12px; border: 2px solid var(--border);
    }

    /* ── SECTION DIVIDER ───────────────────────────────────────────── */
    .section-gap { height: 20px; }

    @media (min-width: 600px) {
      .main { padding: 28px 24px 60px; }
      .upload-zone { padding: 56px 32px; }
      .caption-text { font-size: .95rem; }
      .btn-post { font-size: 1.05rem; padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🌿</div>
    <h1>Social Poster</h1>
    <p>Hunter Land Clearing — Admin Only</p>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
    <button class="login-btn" onclick="checkLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────────────────── -->
<div id="app">

  <div class="header">
    <div class="header-icon">🌿</div>
    <div class="header-text">
      <h1>Social Poster</h1>
      <p>Post to Facebook &amp; Instagram</p>
    </div>
  </div>

  <div class="main">

    <!-- Upload zone (desktop / drag-drop) -->
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="photo-input" accept="image/*" />
      <div class="upload-icon">📷</div>
      <h2>Upload a job photo</h2>
      <p>AI will write 3 captions with Bible verses</p>
      <div class="upload-btn">Choose Photo</div>
    </div>

    <!-- Camera shortcuts (mobile-friendly) -->
    <div class="camera-row" id="camera-row">
      <button class="camera-btn">
        <input type="file" id="camera-input" accept="image/*" capture="environment" />
        📸 Take Photo
      </button>
      <button class="camera-btn">
        <input type="file" id="gallery-input" accept="image/*" />
        🖼️ Gallery
      </button>
    </div>

    <div class="section-gap"></div>

    <!-- Preview -->
    <div class="preview-wrap" id="preview-wrap">
      <div class="preview-img-wrap">
        <img id="preview-img" src="" alt="Preview" />
      </div>
      <div class="preview-actions">
        <span class="preview-filename" id="preview-filename"></span>
        <button class="btn-ghost" onclick="resetAll()">Change Photo</button>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading-wrap" id="loading-wrap">
      <div class="spinner"></div>
      <p>AI is reading your photo<br>and writing captions…</p>
    </div>

    <!-- Captions -->
    <div class="captions-wrap" id="captions-wrap">
      <div class="captions-header">
        <h2>Pick a caption</h2>
        <button class="btn-again" onclick="regenerateCaptions()">↻ New Captions</button>
      </div>
      <div id="captions-list"></div>
    </div>

    <!-- Post button -->
    <div class="post-wrap" id="post-wrap">
      <button class="btn-post" id="btn-post" onclick="postNow()">
        <span>📤</span>
        <span>Post to Facebook &amp; Instagram</span>
      </button>
    </div>

    <!-- Result -->
    <div class="result-wrap" id="result-wrap"></div>

  </div>
</div>

<script>
const SERVER = 'https://foodtruck-cymz.onrender.com';
const PW     = 'Hunter2025!';

let currentFile     = null;
let currentImageUrl = null;
let selectedCaption = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
function checkLogin() {
  const val = document.getElementById('pw-input').value;
  if (val === PW) {
    sessionStorage.setItem('hlc_social_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password.';
    document.getElementById('pw-input').value = '';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkLogin();
});

if (sessionStorage.getItem('hlc_social_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ── Upload / drag-drop ────────────────────────────────────────────────────────
const zone = document.getElementById('upload-zone');

zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', ()  => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
});

document.getElementById('photo-input').addEventListener('change',  e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
document.getElementById('camera-input').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
document.getElementById('gallery-input').addEventListener('change',e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  currentFile     = file;
  currentImageUrl = null;
  selectedCaption = null;

  const reader = new FileReader();
  reader.onload = e => { document.getElementById('preview-img').src = e.target.result; };
  reader.readAsDataURL(file);

  hide('upload-zone');
  hide('camera-row');
  show('preview-wrap');
  document.getElementById('preview-filename').textContent = file.name;

  generateCaptions();
}

// ── Caption generation ────────────────────────────────────────────────────────
async function generateCaptions() {
  show('loading-wrap');
  hide('captions-wrap');
  hide('post-wrap');
  hide('result-wrap');
  selectedCaption = null;

  const form = new FormData();
  form.append('photo', currentFile);

  try {
    const res  = await fetch(`${SERVER}/hunter/social/caption`, { method: 'POST', body: form });
    const data = await res.json();

    if (!res.ok || !data.ok) throw new Error(data.error || 'Caption generation failed');

    currentImageUrl = data.imageUrl;
    renderCaptions(data.captions);

    hide('loading-wrap');
    show('captions-wrap');
  } catch (err) {
    hide('loading-wrap');
    showError(err.message);
  }
}

function regenerateCaptions() {
  if (!currentFile) return;
  generateCaptions();
}

function renderCaptions(captions) {
  const list = document.getElementById('captions-list');
  list.innerHTML = '';

  captions.forEach((text, i) => {
    const card = document.createElement('div');
    card.className = 'caption-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="caption-card-header">
        <input type="radio" class="caption-radio" name="caption" id="radio-${i}" value="${i}" />
        <label class="caption-label" for="radio-${i}">Option ${i + 1}</label>
      </div>
      <textarea class="caption-text" id="caption-text-${i}" rows="6">${escHtml(text)}</textarea>
    `;
    list.appendChild(card);

    card.addEventListener('click', e => {
      if (e.target.tagName === 'TEXTAREA') return;
      document.getElementById(`radio-${i}`).checked = true;
      selectCaption(i);
    });

    document.getElementById(`radio-${i}`).addEventListener('change', () => selectCaption(i));
  });
}

function selectCaption(i) {
  document.querySelectorAll('.caption-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`card-${i}`).classList.add('selected');
  selectedCaption = i;
  show('post-wrap');
  hide('result-wrap');
  // scroll post button into view on mobile
  setTimeout(() => document.getElementById('btn-post').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

// ── Post ──────────────────────────────────────────────────────────────────────
async function postNow() {
  if (selectedCaption === null || !currentImageUrl) return;

  const caption = document.getElementById(`caption-text-${selectedCaption}`).value.trim();
  if (!caption) { alert('Caption is empty.'); return; }

  const btn = document.getElementById('btn-post');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:22px;height:22px;border-width:3px;border-top-color:white;"></span><span>Posting…</span>';

  try {
    const res  = await fetch(`${SERVER}/hunter/social/post`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ imageUrl: currentImageUrl, caption }),
    });
    const data = await res.json();
    renderResult(data);
  } catch (err) {
    renderResult({ facebook: { error: err.message }, instagram: { error: err.message } });
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>📤</span><span>Post to Facebook &amp; Instagram</span>';
  }
}

function renderResult(data) {
  const wrap = document.getElementById('result-wrap');
  const fbOk = data.facebook && !data.facebook.error;
  const igOk = data.instagram && !data.instagram.error;

  wrap.innerHTML = `
    <div class="result-row ${fbOk ? 'ok' : 'err'}">
      <span class="result-icon">${fbOk ? '✅' : '❌'}</span>
      <div>
        <div>Facebook — ${fbOk ? 'Posted successfully' : 'Failed'}</div>
        ${fbOk
          ? `<div class="result-detail">Post ID: ${data.facebook.postId}</div>`
          : `<div class="result-detail">${escHtml(data.facebook?.error || 'Unknown error')}</div>`}
      </div>
    </div>
    <div class="result-row ${igOk ? 'ok' : 'err'}">
      <span class="result-icon">${igOk ? '✅' : '❌'}</span>
      <div>
        <div>Instagram — ${igOk ? 'Posted successfully' : 'Failed'}</div>
        ${igOk
          ? `<div class="result-detail">Media ID: ${data.instagram.postId}</div>`
          : `<div class="result-detail">${escHtml(data.instagram?.error || 'Unknown error')}</div>`}
      </div>
    </div>
    ${(fbOk || igOk) ? `<a href="#" class="post-again" onclick="resetAll();return false;">📷 Post Another Photo</a>` : ''}
  `;
  show('result-wrap');
  wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showError(msg) {
  const wrap = document.getElementById('result-wrap');
  wrap.innerHTML = `<div class="result-row err"><span class="result-icon">❌</span><div>${escHtml(msg)}</div></div>`;
  show('result-wrap');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function resetAll() {
  currentFile     = null;
  currentImageUrl = null;
  selectedCaption = null;
  ['photo-input','camera-input','gallery-input'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('preview-img').src = '';
  document.getElementById('captions-list').innerHTML = '';
  show('upload-zone');
  show('camera-row');
  hide('preview-wrap');
  hide('loading-wrap');
  hide('captions-wrap');
  hide('post-wrap');
  hide('result-wrap');
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
